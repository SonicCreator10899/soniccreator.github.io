  <main class="scene" id="scene">

          <img src="https://soniccreator10899.github.io/soniccreator.github.io/glass-merch/Logo.png" alt="SonicCreator logo incorporated into glass merch effect">
        </div>

        <article class="asset-panel asset-main">
          <img src="https://soniccreator10899.github.io/soniccreator.github.io/glass-merch/Logo.png" alt="SonicCreator logo asset">
        </article>

        <article class="asset-panel asset-drop">
          <img src="https://soniccreator10899.github.io/soniccreator.github.io/glass-merch/Drop.png" alt="SonicCreator drop asset collection">
        </article>

        <div class="palette" aria-label="Logo colors">
          <span class="swatch" style="--c: var(--navy)"></span>
          <span class="swatch" style="--c: var(--cyan)"></span>
          <span class="swatch" style="--c: var(--blue2)"></span>
          <span class="swatch" style="--c: var(--purple2)"></span>

        </div>

  <script>
    const root = document.documentElement;
    const scene = document.querySelector("#scene");
    const wrap = document.querySelector("#glassWrap");
    const pieces = document.querySelectorAll(".asset-panel");

    let target = { x: .5, y: .5 };
    let current = { x: .5, y: .5 };

    function setTarget(clientX, clientY) {
      const rect = scene.getBoundingClientRect();
      target.x = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
      target.y = Math.min(1, Math.max(0, (clientY - rect.top) / rect.height));
    }

    function animate() {
      current.x += (target.x - current.x) * .075;
      current.y += (target.y - current.y) * .075;

      const px = current.x * 100;
      const py = current.y * 100;
      const rx = (current.y - .5) * -13;
      const ry = (current.x - .5) * 18;

      root.style.setProperty("--mx", `${px}%`);
      root.style.setProperty("--my", `${py}%`);
      root.style.setProperty("--rx", `${rx}deg`);
      root.style.setProperty("--ry", `${ry}deg`);
      root.style.setProperty("--shine", `${(current.x - .5) * 760}`);

      wrap.style.transform = `rotateX(${rx * .18}deg) rotateY(${ry * .18}deg)`;

      pieces.forEach((piece, index) => {
        const depth = 18 + index * 12;
        const x = (current.x - .5) * depth;
        const y = (current.y - .5) * depth * -1;
        piece.style.setProperty("--x", `${x}px`);
        piece.style.setProperty("--y", `${y}px`);
      });

      requestAnimationFrame(animate);
    }

    window.addEventListener("pointermove", (event) => setTarget(event.clientX, event.clientY));
    window.addEventListener("pointerdown", (event) => setTarget(event.clientX, event.clientY));

    window.addEventListener("deviceorientation", (event) => {
      if (event.gamma == null || event.beta == null) return;
      target.x = Math.min(1, Math.max(0, .5 + event.gamma / 70));
      target.y = Math.min(1, Math.max(0, .5 + (event.beta - 45) / 90));
    });

    animate();
  </script>
</body>
