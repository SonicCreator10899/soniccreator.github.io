<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SonicCreator — Dropping Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #030611;
      --cyan: #00e5ff;
      --blue2: #0078ff;
      --purple2: #7a20ff;
      --magenta: #c900ff;
      --green: #38ff12;
      --white: #f4f7ff;
      --purple: #7b2fff;
      --blue: #2979ff;
      --violet: #a78bfa;
      --dark: #07070d;
      --text: #f5f7ff;
      --muted: #a9aec7;
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
    }

    body {
      min-height: 100svh;
      background:
        radial-gradient(circle at 18% 16%, rgba(0,229,255,.22), transparent 27rem),
        radial-gradient(circle at 80% 18%, rgba(201,0,255,.18), transparent 25rem),
        radial-gradient(circle at 52% 72%, rgba(123,47,255,.2), transparent 32rem),
        linear-gradient(150deg, #050509, #0d0d1a 48%, #06060c);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .scene {
      min-height: 100svh;
      padding: 22px;
      display: grid;
      place-items: center;
      perspective: 1200px;
      position: relative;
      isolation: isolate;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(0,0,0,.8), transparent 68%);
      z-index: -2;
    }

    .aurora {
      position: absolute;
      inset: auto auto 8% 50%;
      width: min(820px, 95vw);
      height: 320px;
      transform: translateX(-50%) rotateX(70deg);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 38% 48%, rgba(0,229,255,.34), transparent 31%),
        radial-gradient(ellipse at 62% 45%, rgba(201,0,255,.28), transparent 29%),
        radial-gradient(ellipse at 52% 58%, rgba(123,47,255,.26), transparent 43%);
      filter: blur(4px);
      opacity: .9;
      z-index: -1;
    }

    .glass-wrap {
      width: min(1180px, 100%);
      min-height: min(760px, calc(100svh - 44px));
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      align-items: center;
      gap: 28px;
      transform-style: preserve-3d;
